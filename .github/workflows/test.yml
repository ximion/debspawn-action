name: Test

on:
  push:
     branches:
       - main
  pull_request:
  workflow_dispatch:

jobs:
  setup-simple:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Debspawn Setup
        uses: ./setup
        with:
          suite: resolute
          components: >-
            main
            universe
          cache: true

  setup-with-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Debspawn Setup (with packages)
        uses: ./setup
        with:
          suite: stable
          cache: true
          packages: >-
            curl
            git
            ca-certificates

  build-simple:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Debspawn Setup
        uses: ./setup
        with:
          suite: stable

      - name: Package Build
        uses: ./build
        with:
          suite: stable
          debian-dir: tests/dummy/debian
          version: 1.0.0

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-simple_test
          path: build-result/*

      - name: Check results
        run: |
          ls -lha build-results/
          if [[ ! -f build-results/dummy_1.0.0~stable_amd64.deb ]]; then
            echo "::error::Expected package 'dummy_1.0.0~stable_amd64.deb' not found in build results."
            exit 1
          fi
